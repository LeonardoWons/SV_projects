<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Monitoramento da Sala</title>
    <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='styles/sala.css') }}">
    <script src="{{ url_for('static', filename='socket.io.min.js') }}"></script>
    <script src="{{ url_for('static', filename='chart.js') }}"></script>

    <script src="{{ url_for('static', filename='chartjs-plugin-datalabels@2.0.0') }}"></script>

    <script src="{{ url_for('static', filename='moment.min.js') }}"></script>

    <script src="{{ url_for('static', filename='chartjs-adapter-moment@1.0.0') }}"></script>

</head>
<body>

    <div id="content" class="image-container">
        <img id="sala" src="{{ url_for('static', filename='images/sala.png')}}">
        <div id="header">
            <form action="{{ url_for('home') }}">
                <button class="back_button"><b><</b> Voltar</button>
            </form>
        </div>

        <div id="sensor_values">
            <div class="value" id="humid"> 0%</div>
            <div class="value" id="temp"> 0°C</div>
        </div>


        <canvas id="chart2"></canvas>

        <div id="dowload_button">
            <form action="{{ url_for('download') }}" method="post">
                <button value="sala" name="button" class="download_button" type="submit">Download</button>
            </form>
        </div>
    </div>
    <script src="{{ url_for('static', filename='js/sala.js') }}"></script>
</body>
</html>
