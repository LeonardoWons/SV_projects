<!DOCTYPE html>
<html lang="pt-br">
    <head>
    <meta charset="UTF-8">
    <title>Monitoramento</title>

    <script src="{{ url_for('static', filename='socket.io.min.js') }}"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts/dist/echarts.min.js"></script>
    <link rel="stylesheet" type="text/css" href="{{ url_for('static',filename='styles/estufa.css') }}">
    </head>

    <body>

        <div id="header">
            Monitoramento de Dados - Estufa
        </div>

        <div id="main">

            <!-- COLUNA 1 -->
            <div id="sidebar">

                <form action="{{url_for('home')}}">
                    <button class="back_button"> <b><</b> Voltar</button>
                </form>

                <select id="variavelSelect">
                    <option value="value_temp">Temperatura | Estufa</option>
                    <option value="value_humid">Umidade | Estufa</option>
                    <option value="s24ASD_temperature">Temperatura | Pneumatico</option>
                    <option value="s24ASD_humidity">Umidade | Pneumatico</option>
                    <option value="s24ASD_dewpoint">Ponto de orvalho | Pneumatico</option>
                </select>

                <div style="width: 80%;">
                    <div class="text-box">Temperatura | Estufa</div>
                    <div class="valor-box" id="valor1">--</div>
                </div>

                <div style="width: 80%;">
                    <div class="text-box">Umidade | Estufa</div>
                    <div class="valor-box" id="valor2">--</div>
                </div>

                 <div style="width: 80%;">
                    <div class="text-box">Temperatura | Pneumatico</div>
                    <div class="valor-box" id="valor3">--</div>
                 </div>

                <div style="width: 80%;">
                    <div class="text-box">Umidade | Pneumatico</div>
                    <div class="valor-box" id="valor4">--</div>
                </div>

                <div style="width: 80%;">
                    <div class="text-box">Ponto orvalho | Pneumatico</div>
                    <div class="valor-box" id="valor5">--</div>
                </div>

                <div id="dowload_button">
                    <form action="{{ url_for('download') }}" method="post">
                        <button value="estufa" name="button" class="back_button" type="submit">Download</button>
                    </form>
                </div>

            </div>

            <!-- COLUNA 2 -->
            <div id="grafico-container">
                <div class="limites-container">
                    <div class="limite-item">
                        <label>Limite Mínimo</label>
                        <input type="number" id="limiteMin" step="0.1">
                    </div>

                    <div class="limite-item">
                        <label>Limite Máximo</label>
                        <input type="number" id="limiteMax" step="0.1">
                    </div>

                    <button id="aplicarLimites">Aplicar</button>
                </div>
                <div id="grafico"></div>
            </div>

        </div>

        <script src="{{ url_for('static',filename='js/estufa.js') }}"></script>

    </body>
</html>
